services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trpg-backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,https://your-domain.com}
      - REGISTRATION_CODE=${REGISTRATION_CODE:-test123}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-trpg-world}
      # LangChain compatibility aliases for tracing
      - LANGCHAIN_TRACING_V2=${LANGSMITH_TRACING:-false}
      - LANGCHAIN_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGCHAIN_API_KEY=${LANGSMITH_API_KEY}
      - LANGCHAIN_PROJECT=${LANGSMITH_PROJECT:-trpg-world}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - SYSTEM_PROMPT_PATH=app/prompts/system_prompt.md
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
    volumes:
      - backend_data:/app/data
      - ./backend/trpg_world.db:/app/trpg_world.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - npm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
        - VITE_SOCKET_URL=
    container_name: trpg-frontend
    expose:
      - "80"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - npm_network

networks:
  # NPM의 네트워크에 연결 (이름은 NPM 설정에 따라 다를 수 있음)
  npm_network:
    external: true
    name: ${NPM_NETWORK:-npm_default}

volumes:
  backend_data:
